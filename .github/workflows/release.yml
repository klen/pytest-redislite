name: release

on:
  workflow_run:
    workflows: [tests]
    branches: [master]
    types: [completed]

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 5

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        python-version: "3.11"

    - name: Build package
      run: uv build

    - uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist

  release:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
    - name: Download a distribution artifact
      uses: actions/download-artifact@v4
      with:
        name: dist
        path: dist

    - name: Publish distribution 📦 to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        password: ${{ secrets.pypi }}

  notify:
    runs-on: ubuntu-latest
    needs: release
    steps:
    - name: Notify Success
      uses: archive/github-actions-slack@master
      with:
        slack-channel: C2CRL4C4V
        slack-text: "*[${{ github.repository }}]* package is published *(${{ github.ref }})* https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        slack-bot-user-oauth-access-token: ${{ secrets.SLACK_BOT_TOKEN }}
        slack-optional-as_user: false
        slack-optional-icon_emoji: ":white_check_mark:"
